name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-flight run when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Force mock provider so the module-level `app = create_app()` in
      # app/main.py doesn't trip the API-key validator.
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app tests scripts

      - name: Ruff format check
        run: ruff format --check app tests scripts

      - name: Mypy
        run: mypy app scripts

      - name: Pytest with coverage gate
        run: pytest -v --cov=app --cov-report=term-missing --cov-fail-under=80

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: support-orchestrator:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
